<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/devmate_favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Verification -->
    <meta
      name="google-site-verification"
      content="9VfQl9M7H1TIYPOxfijZulcRewQj_ChZK_jNKjbvfKg"
    />

    <!-- Primary SEO -->
    <title>Devmate — Find Your Perfect Developer Partner</title>
    <meta
      name="description"
      content="Connect with talented developers, collaborate on projects, and find your perfect coding partner on Devmate."
    />
    <meta
      name="keywords"
      content="developer matching, find coding partner, developer collaboration, tech networking"
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://devmate.co.in/" />

    <!-- Organization Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Devmate",
        "url": "https://devmate.co.in",
        "logo": "https://devmate.co.in/devmate_favicon.ico",
        "description": "Connect with talented developers and find your perfect coding partner.",
        "sameAs": []
      }
    </script>

    <!-- WebSite + Sitelinks Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Devmate",
        "url": "https://devmate.co.in",
        "potentialAction": [
          {
            "@type": "ViewAction",
            "name": "About",
            "target": "https://devmate.co.in/about"
          },
          {
            "@type": "ViewAction",
            "name": "Contact Us",
            "target": "https://devmate.co.in/contact"
          },
          {
            "@type": "ViewAction",
            "name": "Founder",
            "target": "https://devmate.co.in/founder"
          },
          {
            "@type": "ViewAction",
            "name": "Features",
            "target": "https://devmate.co.in/features"
          },
          {
            "@type": "ViewAction",
            "name": "Pricing",
            "target": "https://devmate.co.in/pricing"
          }
        ]
      }
    </script>

    <!-- Razorpay — kept at end of head to not block rendering -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
